version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: reconnect-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: reconnect-server
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/reconnect
      - JWT_SECRET=reconnect_jwt_secret_key_2024_super_secure
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build: ./client
    container_name: reconnect-client
    ports:
      - '3000:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
